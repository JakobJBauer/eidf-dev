# Static template for a dev pod with SSH (no PVC).
# For any user and optional PVC/GPU, use:  source ~/eidf-dev/eidf-dev-up.sh
#
# If you use this file directly, replace YOUR_EIDF_USER with your cluster username
# (same as $USER on the login node, e.g. s2838806-eidf107).
#
# Optional: tmux logging to PVC. Set LOG_TO_PVC=1 when applying to enable:
#   LOG_TO_PVC=1 envsubst < dev-pod.yaml | kubectl create -f -
apiVersion: batch/v1
kind: Job
metadata:
  generateName: YOUR_EIDF_USER-dev-
  labels:
    eidf/user: YOUR_EIDF_USER
    kueue.x-k8s.io/queue-name: eidf107ns-user-queue
    kueue.x-k8s.io/priority-class: batch-workload-priority
  annotations:
    eidf/user: your-username
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        eidf/user: YOUR_EIDF_USER
    spec:
      activeDeadlineSeconds: 43200
      restartPolicy: Never
      containers:
        - name: dev
          image: ubuntu:24.04
          ports:
            - containerPort: 22
              protocol: TCP
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          env:
            - name: LOG_TO_PVC
              value: "${LOG_TO_PVC:-}"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              apt-get update
              apt-get install -y openssh-server rsync nano htop tmux
              mkdir -p /var/run/sshd /root/.ssh /workspace/writeable
              touch /root/.ssh/authorized_keys
              chmod 700 /root/.ssh
              chmod 600 /root/.ssh/authorized_keys
              [ -f /root/.bashrc ] || cp /etc/skel/.bashrc /root/.bashrc
              sed -i 's/#force_color_prompt=yes/force_color_prompt=yes/' /root/.bashrc || true
              if [ -n "$LOG_TO_PVC" ]; then
                mkdir -p /workspace/writeable/data/logs
                cat > /workspace/writeable/data/logs/tmux-hook.sh << 'HOOKEND'
#!/bin/sh
LOG_DIR="/workspace/writeable/data/logs"
SESSION_ID="$1"
SESSION_NAME="$2"
PANE_ID="$3"
mkdir -p "$LOG_DIR"
if [ -z "$PANE_ID" ]; then
  PANE_ID=$(tmux list-panes -t "$SESSION_ID" -s -F '#{pane_id}' 2>/dev/null | head -1)
fi
LOG=$(tmux show-options -t "$SESSION_ID" -vq @session_log_file 2>/dev/null)
if [ -z "$LOG" ]; then
  LOG="$LOG_DIR/${SESSION_NAME}-$(date +%Y%m%d_%H%M%S).log"
  tmux set-option -t "$SESSION_ID" @session_log_file "$LOG"
fi
if [ -n "$PANE_ID" ]; then
  tmux pipe-pane -t "$PANE_ID" -o "cat >> $LOG" &
fi
HOOKEND
                chmod +x /workspace/writeable/data/logs/tmux-hook.sh
                cat >> /root/.tmux.conf << 'CONFEND'
set-hook -g after-new-session 'run-shell "/workspace/writeable/data/logs/tmux-hook.sh #{session_id} #{session_name} #{pane_id}"'
set-hook -g after-new-window 'run-shell "/workspace/writeable/data/logs/tmux-hook.sh #{session_id} #{session_name} #{pane_id}"'
set-hook -g after-split-window 'run-shell "/workspace/writeable/data/logs/tmux-hook.sh #{session_id} #{session_name} #{pane_id}"'
CONFEND
              fi
              sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
              ssh-keygen -A
              /usr/sbin/sshd
              sleep infinity
          resources:
            limits:
              nvidia.com/gpu: 0
              cpu: 4
              memory: 16Gi
            requests:
              cpu: 2
              memory: 8Gi
          volumeMounts:
            # Optional PVC mount at /workspace (uncomment and set claimName below)
            # - name: workspace
            #   mountPath: /workspace
            - name: publicdata
              mountPath: /hf
              readOnly: true
      # Uncomment and set claimName to mount a PVC at /workspace
      volumes:
        # - name: workspace
        #   persistentVolumeClaim:
        #     claimName: YOUR_PVC_NAME
        - name: publicdata
          nfs:
            server: 10.24.1.255
            path: /public/hf
